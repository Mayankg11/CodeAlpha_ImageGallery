<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Image Gallery</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="heading">

    <h1>Image Gallery</h1>

    <p>
      Explore the beauty of nature through forests, rivers,
       mountains, and oceans captured in stunning moments.
    </p>

  </section>

  <section class="gallery">

    <div class="image tall">
      <img src="forest1.jpg" alt="Forest Image">
    </div>

    <div class="image wide">
      <img src="forest2.jpg" alt="Forest Image">
    </div>

    <div class="image">
      <img src="river1.jpg" alt="River Image">
    </div>

    <div class="image tall">
      <img src="river2.jpg" alt="River Image">
    </div>

    <div class="image wide">
      <img src="mountain1.jpg" alt="Mountain Image">
    </div>

    <div class="image">
      <img src="mountain2.jpg" alt="Mountain Image">
    </div>

    <div class="image">
      <img src="ocean1.jpg" alt="Ocean Image">
    </div>

    <div class="image wide">
      <img src="ocean2.webp" alt="Ocean Image">
    </div>

  </section>
<script src="script.js"></script>
</body>
</html>
